name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile source
        run: python -m compileall app tests

      - name: Run tests
        env:
          DEMO_MODE: "true"
          CAPITALLENS_DB_PATH: /tmp/capitallens_watchlist.db
          CAPITALLENS_RAG_INDEX_PATH: /tmp/capitallens_rag.sqlite
        run: pytest

